
# ── Data PV ──

apiVersion: v1

kind: PersistentVolume

metadata:

  name: odoo-test-data-pv

spec:

  capacity:

    storage: 5Gi

  accessModes:

    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  storageClassName: local-storage

  hostPath:

    path: /mnt/odoo/test/data

---

apiVersion: v1

kind: PersistentVolumeClaim

metadata:

  name: odoo-test-data-pvc

  namespace: odoo-test

spec:

  accessModes:

    - ReadWriteOnce

  storageClassName: local-storage

  resources:

    requests:

      storage: 5Gi

---

