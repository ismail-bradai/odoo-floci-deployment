
# ── Data PV ──

apiVersion: v1

kind: PersistentVolume

metadata:

  name: odoo-prod-data-pv

spec:

  capacity:

    storage: 5Gi

  accessModes:

    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  storageClassName: local-storage

  hostPath:

    path: /mnt/odoo/prod/data

---

apiVersion: v1

kind: PersistentVolumeClaim

metadata:

  name: odoo-prod-data-pvc

  namespace: odoo-prod

spec:

  accessModes:

    - ReadWriteOnce

  storageClassName: local-storage

  resources:

    requests:

      storage: 5Gi

---

